<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Bomberman</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        h1 {
            color: #ff6600;
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        #game-canvas {
            border: 2px solid #444;
            border-radius: 4px;
            display: block;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 720px;
            padding: 12px 16px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 0 0 4px 4px;
            font-size: 16px;
        }
        .player-score {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .player-score .label {
            font-weight: bold;
            font-size: 14px;
        }
        .player-score .score {
            font-size: 22px;
            font-weight: bold;
            transition: color 0.3s;
        }
        #p1-label { color: #7c3aed; }
        #p2-label { color: #e85d04; }
        #p1-score { color: #7c3aed; }
        #p2-score { color: #e85d04; }
        .score-flash { color: #ffcc00 !important; }
        #center-info {
            text-align: center;
        }
        #bricks-display {
            font-size: 13px;
            color: #8b4513;
        }
        #time-display {
            font-size: 20px;
            font-weight: bold;
        }
        .time-critical {
            color: #ff3333 !important;
        }
        #thoughts-container {
            display: flex;
            width: 720px;
            gap: 0;
            margin-top: 0;
        }
        .thought-panel {
            flex: 1;
            background: #0f3460;
            border: 1px solid #333;
            padding: 12px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
        }
        .thought-panel:first-child {
            border-radius: 0 0 0 4px;
            border-right: none;
        }
        .thought-panel:last-child {
            border-radius: 0 0 4px 0;
        }
        .thought-panel h3 {
            font-size: 13px;
            margin-bottom: 6px;
        }
        #p1-thought-title { color: #7c3aed; }
        #p2-thought-title { color: #e85d04; }
        .thought-text {
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
        }
        .thought-action {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            font-style: italic;
        }
        #connection-status {
            font-size: 12px;
            margin-top: 8px;
            color: #666;
        }
        .connected { color: #4caf50 !important; }
        .disconnected { color: #ff3333 !important; }
    </style>
</head>
<body>
    <h1>LLM BOMBERMAN</h1>
    <canvas id="game-canvas" width="720" height="624"></canvas>
    <div id="hud">
        <div class="player-score">
            <span id="p1-label" class="label">BOMBER-1</span>
            <span id="p1-score" class="score">0</span>
        </div>
        <div id="center-info">
            <div id="bricks-display">Bricks: 51</div>
            <div id="time-display">3:00</div>
        </div>
        <div class="player-score">
            <span id="p2-score" class="score">0</span>
            <span id="p2-label" class="label">BOMBER-2</span>
        </div>
    </div>
    <div id="thoughts-container">
        <div class="thought-panel">
            <h3 id="p1-thought-title">BOMBER-1</h3>
            <div id="p1-thought" class="thought-text">Waiting for game...</div>
            <div id="p1-action" class="thought-action"></div>
        </div>
        <div class="thought-panel">
            <h3 id="p2-thought-title">BOMBER-2</h3>
            <div id="p2-thought" class="thought-text">Waiting for game...</div>
            <div id="p2-action" class="thought-action"></div>
        </div>
    </div>
    <div id="connection-status" class="disconnected">Connecting...</div>
    <script src="/static/game.js"></script>
</body>
</html>
