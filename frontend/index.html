<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TokenBrawl</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            color: #e0e0e0;
            font-family: 'Courier New', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            min-height: 100vh;
        }
        #layout {
            display: flex;
            flex-direction: row;
            align-items: flex-start;
            gap: 10px;
        }
        #center-column {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .side-output-panel {
            width: 220px;
            background: #0a1628;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 10px 10px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 134px;
        }
        .side-output-title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }
        #p1-side-title { color: #7c3aed; }
        #p2-side-title { color: #e85d04; }
        .side-output-text {
            font-size: 10px;
            color: #f0c060;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-y: auto;
            background: #1a1400;
            border: 1px solid #2e2800;
            border-radius: 2px;
            padding: 6px 8px;
            max-height: 680px;
            min-height: 80px;
        }
        .output-action-line {
            display: grid;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
        }
        .output-action-badge {
            font-size: 15px;
            font-weight: bold;
            letter-spacing: 1px;
            padding: 3.5px 11.5px;
            border-radius: 3px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .action-move        { background: #1a3a1a; color: #66dd66; border: 1px solid #2a6a2a; }
        .action-move_and_bomb { background: #3a1a00; color: #ff8833; border: 1px solid #883300; }
        .action-bomb_here   { background: #3a0000; color: #ff4444; border: 1px solid #880000; }
        .action-wait        { background: #1a1a2e; color: #8888cc; border: 1px solid #333366; }
        .output-illegal-badge {
            font-size: 11px;
            font-weight: bold;
            color: #ff4444;
            background: #2a0000;
            border: 1px solid #880000;
            border-radius: 3px;
            padding: 2px 8px;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .output-action-target {
            font-size: 14px;
            color: #aaa;
        }
        .output-reasoning {
            font-size: 15px;
            color: #f0c060;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
        }
        h1 {
            color: #ff6600;
            margin-bottom: 10px;
            font-size: 24px;
            letter-spacing: 2px;
        }
        #game-canvas {
            border: 2px solid #444;
            border-radius: 4px;
            display: block;
        }
        #game-container {
            position: relative;
            width: 720px;
        }
        #hud {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 720px;
            padding: 12px 16px;
            background: #16213e;
            border: 1px solid #333;
            border-radius: 4px 4px 0 0;
            font-size: 16px;
        }
        .player-score {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .player-score .label {
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .player-score .score {
            font-size: 28px;
            font-weight: bold;
            transition: color 0.3s;
            line-height: 1;
        }
        #p1-label { color: #7c3aed; }
        #p2-label { color: #e85d04; }
        #p1-score { color: #7c3aed; }
        #p2-score { color: #e85d04; }
        .score-flash { color: #ffcc00 !important; }
        #center-info {
            text-align: center;
        }
        #bricks-display {
            font-size: 20px;
            font-weight: bold;
        }
        #time-display {
            font-size: 13px;
            color: #8b4513;
        }
        .time-critical {
            color: #ff3333 !important;
        }
        #thoughts-container {
            display: flex;
            width: 720px;
            gap: 0;
            margin-top: 0;
        }
        .thought-panel {
            flex: 1;
            background: #0f3460;
            border: 1px solid #333;
            padding: 12px;
            min-height: 100px;
            max-height: 150px;
            overflow-y: auto;
        }
        .thought-panel:first-child {
            border-radius: 0 0 0 4px;
            border-right: none;
        }
        .thought-panel:last-child {
            border-radius: 0 0 4px 0;
        }
        .thought-panel h3 {
            font-size: 13px;
            margin-bottom: 6px;
        }
        #p1-thought-title { color: #7c3aed; }
        #p2-thought-title { color: #e85d04; }
        .thought-text {
            font-size: 12px;
            color: #aaa;
            line-height: 1.4;
        }
        .thought-action {
            font-size: 11px;
            color: #666;
            margin-top: 4px;
            font-style: italic;
        }
        #connection-status {
            font-size: 12px;
            margin-top: 8px;
            color: #666;
        }
        .connected { color: #4caf50 !important; }
        .disconnected { color: #ff3333 !important; }
        #restart-btn {
            display: none;
            position: absolute;
            top: 72%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 36px;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 2px;
            color: #fff;
            background: #ff6600;
            border: 2px solid #cc5200;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
        }
        #restart-btn:hover {
            background: #e85d04;
        }
        #start-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 14px 40px;
            font-size: 24px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            letter-spacing: 3px;
            color: #fff;
            background: #4caf50;
            border: 2px solid #388e3c;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
            z-index: 10;
        }
        #start-btn:hover {
            background: #388e3c;
        }
        #death-log {
            display: none;
            width: 720px;
            margin-top: 8px;
            padding: 12px;
            background: #2a0a0a;
            border: 1px solid #ff3333;
            border-radius: 4px;
            font-size: 12px;
            color: #ff9999;
            max-height: 200px;
            overflow-y: auto;
        }
        #death-log h3 {
            color: #ff3333;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .death-entry {
            margin-bottom: 6px;
            padding: 4px 8px;
            background: #1a0505;
            border-radius: 2px;
            font-family: 'Courier New', monospace;
        }
        .death-entry .action-line {
            color: #cc8888;
        }
        .prompt-placeholder {
            font-size: 10px;
            color: #444;
            font-style: italic;
        }
        #prompt-input-container {
            display: flex;
            width: 720px;
            gap: 0;
            margin-top: 8px;
        }
        .prompt-panel {
            flex: 1;
            background: #0a1628;
            border: 1px solid #333;
            padding: 10px 12px;
        }
        .prompt-panel:first-child {
            border-radius: 4px 0 0 4px;
            border-right: none;
        }
        .prompt-panel:last-child {
            border-radius: 0 4px 4px 0;
        }
        .prompt-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .prompt-panel-header h3 {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #p1-prompt-title { color: #7c3aed; }
        #p2-prompt-title { color: #e85d04; }
        .prompt-toggle {
            font-size: 11px;
            color: #888;
            background: none;
            border: 1px solid #444;
            border-radius: 3px;
            padding: 1px 6px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
        .prompt-toggle:hover { color: #ccc; border-color: #888; }
        .prompt-text {
            font-size: 10px;
            color: #7db87d;
            line-height: 1.4;
            white-space: pre-wrap;
            word-break: break-word;
            max-height: 200px;
            overflow-y: auto;
            background: #060e1a;
            border: 1px solid #1e2e1e;
            border-radius: 2px;
            padding: 4px 6px;
        }
        .prompt-body { display: block; }
        .prompt-body.collapsed { display: none; }
    </style>
</head>
<body>
    <div id="layout">
    <div class="side-output-panel">
        <div class="side-output-title" id="p1-side-title">PLAYER-1 OUTPUT</div>
        <div id="p1-prompt-output" class="side-output-text"><span class="prompt-placeholder">No response yet...</span></div>
    </div>
    <div id="center-column">
    <div id="hud">
        <div class="player-score">
            <span id="p1-label" class="label">Player-1 score:</span>
            <span id="p1-score" class="score">0</span>
        </div>
        <div id="center-info">
            <div id="bricks-display">Bricks left: 21</div>
            <div id="time-display">Time left: 3:00</div>
        </div>
        <div class="player-score">
            <span id="p2-label" class="label">Player-2 score:</span>
            <span id="p2-score" class="score">0</span>
        </div>
    </div>
    <div id="game-container">
        <canvas id="game-canvas" width="720" height="624"></canvas>
        <button id="start-btn">START</button>
        <button id="restart-btn">RESTART</button>
    </div>
    <div id="connection-status" class="disconnected">Connecting...</div>
    <div id="death-log"></div>
    <div id="prompt-input-container">
        <div class="prompt-panel">
            <div class="prompt-panel-header">
                <h3 id="p1-prompt-title">PLAYER-1 INPUT</h3>
                <button class="prompt-toggle" data-target="p1-prompt-body">collapse</button>
            </div>
            <div id="p1-prompt-body" class="prompt-body">
                <div id="p1-prompt-input" class="prompt-text"><span class="prompt-placeholder">No prompt yet...</span></div>
            </div>
        </div>
        <div class="prompt-panel">
            <div class="prompt-panel-header">
                <h3 id="p2-prompt-title">PLAYER-2 INPUT</h3>
                <button class="prompt-toggle" data-target="p2-prompt-body">collapse</button>
            </div>
            <div id="p2-prompt-body" class="prompt-body">
                <div id="p2-prompt-input" class="prompt-text"><span class="prompt-placeholder">No prompt yet...</span></div>
            </div>
        </div>
    </div>
    </div><!-- /center-column -->
    <div class="side-output-panel">
        <div class="side-output-title" id="p2-side-title">PLAYER-2 OUTPUT</div>
        <div id="p2-prompt-output" class="side-output-text"><span class="prompt-placeholder">No response yet...</span></div>
    </div>
    </div><!-- /layout -->
    <script src="/static/game.js"></script>
</body>
</html>
